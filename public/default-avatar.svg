<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep slate matching Columna Pública's dark aesthetic -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#051122" />
      <stop offset="100%" stop-color="#020914" />
    </linearGradient>
    <!-- Golden Accent Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cfa543" />
      <stop offset="50%" stop-color="#dfba53" />
      <stop offset="100%" stop-color="#f5d77f" />
    </linearGradient>
    <!-- Avatar Silhouette Gradient -->
    <linearGradient id="user-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b2e46" />
      <stop offset="100%" stop-color="#0c192b" />
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="60" cy="60" r="58" fill="url(#bg-grad)" stroke="url(#gold-grad)" stroke-width="2" />

  <!-- Subtle star motif in the upper corner representing strategic direction -->
  <path d="M90,32 L91.5,35 L94.5,35 L92,37 L93,40 L90,38 L87,40 L88,37 L85.5,35 L88.5,35 Z" fill="#dfba53" opacity="0.6" />

  <!-- Custom User Silhouette -->
  <!-- Head -->
  <circle cx="60" cy="46" r="18" fill="url(#user-grad)" stroke="url(#gold-grad)" stroke-width="1" stroke-opacity="0.5" />
  
  <!-- Shoulders -->
  <path d="M26,92 C26,74 40,68 60,68 C80,68 94,74 94,92 C94,96 90,102 60,102 C30,102 26,96 26,92 Z" fill="url(#user-grad)" stroke="url(#gold-grad)" stroke-width="1" stroke-opacity="0.5" />

  <!-- Stylized Column design overlay -->
  <line x1="60" y1="74" x2="60" y2="92" stroke="#dfba53" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.6" />
</svg>
