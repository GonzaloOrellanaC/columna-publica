<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bienvenido a Columna Pública</title>
  <style>
    body { font-family: 'Georgia', serif; background: #081017; color: #e0e6ed; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 2em auto; background: #0d1926; border-radius: 8px; box-shadow: 0 2px 8px #0002; padding: 2em; }
    .logo { display: block; max-width: 280px; margin: 0 0 1em 0; }
    h1 { font-family: 'Cinzel', serif; color: #4fd1c5; }
    p, b { color: #ffffff; }
    .btn { display: inline-block; background: #4fd1c5; color: #081017; padding: 0.8em 2em; border-radius: 4px; text-decoration: none; font-weight: bold; margin-top: 1.5em; }
    .footer { margin-top: 2em; color: #a0aec0; font-size: 0.9em; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/public/horizontal-transparente.png" alt="Columna Pública" class="logo" />
    <h1>¡Bienvenido a Columna Pública!</h1>
    <p>Hola <b>{{name}}</b>,</p>
    <p>Tu cuenta ha sido creada exitosamente. Para comenzar, por favor establece tu contraseña usando el siguiente enlace:</p>
    <a href="{{resetLink}}" class="btn">Establecer contraseña</a>
    <p class="footer">Si no solicitaste este registro, puedes ignorar este correo.</p>
  </div>
</body>
</html>
